<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criar Conta</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

html,body{
    overflow-y:auto;
}

body{
    background:#f4f5f7;
    display:flex;
    justify-content:center;
    padding:20px;
    min-height:100vh;
}

.container{
    width:100%;
    max-width:360px;
    background:white;
    border-radius:30px;
    padding:30px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo-box{
    width:80px;
    height:80px;
    background:#18c25c;
    margin:auto;
    border-radius:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    color:white;
}

.logo h1{
    color:#14b654;
    font-size:38px;
    margin-top:15px;
}

.logo h2{
    color:#444;
    font-weight:300;
    letter-spacing:2px;
}

.logo p{
    color:#777;
    margin-top:10px;
    font-size:15px;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    color:#333;
    font-size:14px;
}

.input-group input{
    width:100%;
    padding:16px;
    border:none;
    background:#f3f3f3;
    border-radius:14px;
    font-size:15px;
    outline:none;
}

.criar-btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    background:#14c25a;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.criar-btn:hover{
    background:#0fa44b;
}

.login{
    text-align:center;
    margin-top:25px;
    font-size:14px;
}

.login a{
    color:#14b654;
    text-decoration:none;
    font-weight:bold;
}

</style>

</head>
<body>

<div class="container">



<div class="logo"> <div class="logo-box">🛒</div> <h1>MERCADO</h1> <h2>INTELIGENTE</h2> <p>Criar nova conta</p> </div> <div class="input-group"> <label>Nome</label> <input type="text" id="nome" placeholder="Seu nome"> </div> <div class="input-group"> <label>Email</label> <input type="email" id="email" placeholder="email@email.com"> </div> <div class="input-group"> <label>Senha</label> <input type="password" id="senha" placeholder="••••••••"> </div> <button class="criar-btn" id="btnCadastrar"> CRIAR CONTA </button> <div id="statusAuth"></div> <div class="login"> Já possui conta? <a href="index.html">Entrar</a> </div>


    

    






    
<script type="module" src="cadastro.js"></script>


       


    

</body>
</html>
