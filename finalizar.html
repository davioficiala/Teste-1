<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finalizar Venda</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    padding:20px;
}

.container{
    max-width:390px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:15px;
}

h2{
    margin-bottom:20px;
}

.item{
    margin-bottom:15px;
}

input,select{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:10px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:20px;
    background:#16a34a;
    color:white;
    font-size:16px;
    margin-top:20px;
}
</style>

</head>
<body>

<div class="container">

<h2>Finalizar Venda</h2>

<div class="item">
<label>Cliente</label>
<input type="text" placeholder="Nome do cliente">
</div>

<div class="item">
<label>Produto</label>
<input type="text" value="Gás P13 - Bruno">
</div>

<div class="item">
<label>Quantidade</label>
<input type="number" value="1">
</div>

<div class="item">
<label>Total</label>
<input type="number" value="120">
</div>

<div class="item">
<label>Pagamento</label>
<select>
    <option>Pix</option>
    <option>Dinheiro</option>
    <option>Cartão</option>
</select>
</div>

<button>CONFIRMAR VENDA</button>

</div>

</body>
</html>
